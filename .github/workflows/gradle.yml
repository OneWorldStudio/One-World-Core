# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Build OneWorldCore

on:
  push:
    branches: [ "main", "1.20.1" ]
  pull_request:
    branches: [ "main", "1.20.1" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Use GitHub Actions Java home
        shell: pwsh
        run: |
          (Get-Content gradle.properties) |
            Where-Object { $_ -notmatch '^org\.gradle\.java\.home=' } |
            Set-Content gradle.properties -Encoding ASCII
          "JAVA_HOME=$env:JAVA_HOME"

      - name: Build OneWorldCore jar
        shell: pwsh
        run: |
          Get-Content core-version.properties
          .\gradlew.bat :oneworldstudio:oneworldcoreJar --stacktrace --no-daemon

      - name: Upload OneWorldCore jar
        uses: actions/upload-artifact@v4
        with:
          name: OneWorldCore-1.20.1-${{ github.run_number }}
          path: projects/oneworldstudio/build/libs/oneworldcore-*.jar
          if-no-files-found: error

      - name: Upload Gradle diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: OneWorldCore-gradle-diagnostics-${{ github.run_number }}
          path: |
            **/build/reports/**
            **/build/**/*.log
            **/hs_err_pid*.log
          if-no-files-found: ignore
